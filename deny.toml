[graph]
targets = []

[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "Unicode-3.0", "MPL-2.0", "CC0-1.0", "Zlib"]

[bans]
multiple-versions = "deny"

[[bans.deny]]
name     = "rusqlite"
wrappers = ["rally-store"]

[[bans.deny]]
name     = "tokio"
wrappers = [
    "rally-events",
    "rally-capture",
    "rally-host-zellij",
    "rally-hooks",
    "rally-inbox",
    "rally-daemon",
    "rally-cli",
    "rally-mcp",
]

[[bans.deny]]
name     = "zellij-tile"
wrappers = ["rally-plugin"]

[[bans.deny]]
name     = "rmcp"
wrappers = ["rally-mcp"]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore  = []

[sources]
unknown-registry   = "deny"
unknown-git        = "deny"
allow-registry     = ["https://github.com/rust-lang/crates.io-index"]
